<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Пульт Yeelight</title>

<!-- Admin runtime: даёт socket, adapter, instance -->
<script type="text/javascript" src="../../lib/js/socket.io.js"></script>
<script type="text/javascript" src="../../js/adapter-settings.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #07090f;
  --card:       rgba(255,255,255,0.04);
  --border:     rgba(255,255,255,0.08);
  --border-hi:  rgba(0,212,255,0.35);
  --accent:     #00d4ff;
  --accent-dim: rgba(0,212,255,0.15);
  --amber:      #ffaa00;
  --amber-dim:  rgba(255,170,0,0.15);
  --text:       #d8e8f0;
  --muted:      rgba(255,255,255,0.35);
  --danger:     #ff4d4d;
}

html, body { height: 100%; }
body {
  font-family: 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 60% 50% at 10% 40%, rgba(0,100,200,0.12) 0%, transparent 100%),
    radial-gradient(ellipse 50% 60% at 90% 70%, rgba(0,180,150,0.08) 0%, transparent 100%);
  color: var(--text);
  padding: 1.5rem;
  overflow-y: auto;
}

header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; }
header h1 {
  font-size: 1rem; font-weight: 600;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--accent);
}
.header-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 8px var(--accent);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

#devices { display: flex; flex-wrap: wrap; gap: 1.25rem; align-items: flex-start; }
#empty { color: var(--muted); font-size: 0.9rem; margin-top: 3rem; text-align: center; width: 100%; }

/* ─── Card ─── */
.card {
  width: 340px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 1.25rem;
  backdrop-filter: blur(24px);
  transition: border-color 0.4s, box-shadow 0.4s;
}
.card.connected { border-color: var(--border-hi); box-shadow: 0 0 40px rgba(0,212,255,0.06); }

.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
.card-name { font-size: 0.95rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
.card-sub  { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }
.status-dot { display: flex; align-items: center; gap: 6px; font-size: 0.68rem; color: var(--muted); }
.status-dot::before {
  content: ''; display: block; width: 8px; height: 8px; border-radius: 50%;
  background: rgba(255,255,255,0.15);
  transition: background 0.4s, box-shadow 0.4s;
}
.status-dot.on::before { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
.status-dot.on { color: #00ff88; }

/* ─── Живая «лампа» (v1 — круг; силуэты по типам — фаза 2) ─── */
.lamp-visual {
  display: flex; align-items: center; justify-content: center;
  padding: 1rem 0 1.25rem;
}
.lamp-glow {
  position: relative;
  width: 72px; height: 72px; border-radius: 50%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  transition: background 0.5s, box-shadow 0.5s, border-color 0.5s;
}
/* Кольцо фоновой подсветки (лампы с hasBG) */
.lamp-glow .bg-ring {
  position: absolute; inset: -12px; border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.06);
  transition: border-color 0.5s, box-shadow 0.5s;
  pointer-events: none;
}

/* ─── Sections / sliders / buttons — стилистика panel.html ─── */
.section-label {
  font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.18em;
  color: var(--muted); margin: 0.9rem 0 0.4rem;
}
.slider-row { display: flex; align-items: center; gap: 0.7rem; margin: 0.4rem 0; }
.slider-label { font-size: 0.68rem; color: var(--muted); width: 60px; flex-shrink: 0; }
input[type=range] {
  flex: 1; height: 4px; -webkit-appearance: none; appearance: none;
  background: rgba(255,255,255,0.1); border-radius: 4px; outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 15px; height: 15px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 8px var(--accent); cursor: pointer;
  transition: transform 0.1s;
}
input[type=range]::-webkit-slider-thumb:active { transform: scale(1.3); }
.ct-track input[type=range]  { background: linear-gradient(to right, #ff9132, #fff0d0, #c8e8ff); }
.hue-track input[type=range] {
  background: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00);
}
.bg-track input[type=range]::-webkit-slider-thumb { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
.slider-val { width: 46px; text-align: right; font-size: 0.72rem; font-weight: 600; color: var(--accent); }
.bg-track .slider-val { color: var(--amber); }

.btn-group { display: flex; flex-wrap: wrap; gap: 0.35rem; margin: 0.4rem 0; }
.btn {
  font-family: inherit; font-size: 0.66rem; font-weight: 500; letter-spacing: 0.06em;
  padding: 0.4rem 0.7rem; border-radius: 9px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.04); color: var(--text);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, transform 0.1s, box-shadow 0.15s;
}
.btn:hover {
  background: var(--accent-dim); border-color: rgba(0,212,255,0.5);
  box-shadow: 0 0 12px rgba(0,212,255,0.15); transform: translateY(-1px);
}
.btn:active { transform: scale(0.97); }
.btn.btn-off { border-color: rgba(255,77,77,0.3); color: var(--danger); }
.btn.btn-off:hover { background: rgba(255,77,77,0.15); border-color: rgba(255,77,77,0.6); box-shadow: 0 0 12px rgba(255,77,77,0.15); }
.btn.btn-bg  { border-color: rgba(255,170,0,0.25); color: var(--amber); }
.btn.btn-bg:hover { background: var(--amber-dim); border-color: rgba(255,170,0,0.6); box-shadow: 0 0 12px rgba(255,170,0,0.15); }

.color-row { display: flex; align-items: center; gap: 0.7rem; margin: 0.4rem 0; }
input[type=color] {
  width: 42px; height: 26px; padding: 0; border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.15); background: none; cursor: pointer;
}

.divider { height: 1px; background: var(--border); margin: 0.9rem 0; }
</style>
</head>
<body>

<header>
  <div class="header-dot"></div>
  <h1>Пульт Yeelight</h1>
</header>

<div id="devices"><div id="empty">Подключение…</div></div>

<script>
/* eslint-env browser */
/* global socket, adapter, instance, io */

// ═══════════════════════════════════════════════════════════════════════════
// Пульт-вкладка. Команды идут ТОЛЬКО штатным путём:
// setState('<base>.<KEY>', {val, ack:false}) → main.onStateChange → TX_MAP.
// UI строится по caps устройства — та же семантика гейтов, что в TX_MAP
// (пустые caps = всё включено).
// ═══════════════════════════════════════════════════════════════════════════

// adapter-settings.js вызывает load(settings) для страниц настроек; для вкладки
// определяем no-op совместимые заглушки и стартуем сами по socket-соединению.
function load(settings) { if (settings && !booted) boot(settings); }
function save(cb) { if (cb) cb({}); }

const ADAPTER = 'yeelight-lan-direct';
const INSTANCE = (typeof instance !== 'undefined' && instance !== null)
    ? instance
    : (new URLSearchParams(location.search).get('instance') || '0');
const NS = `${ADAPTER}.${INSTANCE}`;

let booted = false;
const cards = {};      // segment → card element
const states = {};     // segment → { key: val }
const devBySeg = {};   // segment → device config (ip, name, model, caps)
const dragging = new Set(); // id слайдеров, которые сейчас тащат — не перетирать

// ─── Копия safeSegment из core/YeelightDevice.js — менять только синхронно! ──
function safeSegment(value) {
    return String(value || 'device')
        .trim()
        .replace(/[^\w\-]/g, '_')
        .replace(/_+/g, '_')
        .replace(/^_+|_+$/g, '') || 'device';
}

// ─── Хелперы значений/цвета ──────────────────────────────────────────────────
function isOn(v) { return v === true || v === 'on' || v === 1 || v === '1' || v === 'true'; }

/** Приближение цвета чёрного тела (Tanner Helland) для CT-свечения. */
function kelvinToCss(k) {
    k = Math.min(6500, Math.max(1000, +k || 4000)) / 100;
    let r, g, b;
    r = k <= 66 ? 255 : 329.7 * Math.pow(k - 60, -0.1332);
    g = k <= 66 ? 99.47 * Math.log(k) - 161.1 : 288.1 * Math.pow(k - 60, -0.0755);
    b = k >= 66 ? 255 : (k <= 19 ? 0 : 138.5 * Math.log(k - 10) - 305.0);
    const c = v => Math.round(Math.min(255, Math.max(0, v)));
    return `rgb(${c(r)},${c(g)},${c(b)})`;
}

function intToHex(v) { return '#' + (+v & 0xffffff).toString(16).padStart(6, '0'); }

/** Текущий цвет основного света или null, если выключен. */
function lampColor(st) {
    if (!isOn(st.power)) return null;
    const mode = Number(st.color_mode) || 2;
    if (mode === 1 && st.rgb != null) return intToHex(st.rgb);
    if (mode === 3 && st.hue != null) return `hsl(${st.hue}, ${st.sat != null ? st.sat : 100}%, 60%)`;
    return kelvinToCss(st.ct || 4000);
}

/** Цвет фоновой подсветки или null. */
function bgColor(st) {
    if (!isOn(st.bg_power)) return null;
    if (st.bg_rgb != null && +st.bg_rgb > 0) return intToHex(st.bg_rgb);
    if (st.bg_hue != null) return `hsl(${st.bg_hue}, ${st.bg_sat != null ? st.bg_sat : 100}%, 60%)`;
    return kelvinToCss(st.bg_ct || 4000);
}

// ─── Команды: единственный путь — setState ack=false ────────────────────────
function setSt(seg, key, val) {
    socket.emit('setState', `${NS}.${seg}.${key}`, { val, ack: false }, err => {
        if (err) console.error(`[tab] setState ${seg}.${key}:`, err);
    });
}

// ─── Построение карточки по caps (зеркало гейтов TX_MAP) ────────────────────
function buildCard(dev) {
    const seg = safeSegment(dev.id || dev.ip);
    const caps = (dev.caps && typeof dev.caps === 'object') ? dev.caps : {};
    const all = Object.keys(caps).length === 0;
    const has = f => all || !!caps[f];

    const title = dev.name || dev.model || dev.ip;

    // Кнопки основного света
    let btns = `<button class="btn" onclick="setSt('${seg}','ON_NORMAL',true)">Обычный</button>`;
    if (has('hasCT'))   btns += `<button class="btn" onclick="setSt('${seg}','ON_CT',true)">CT</button>`;
    if (has('hasRGB'))  btns += `<button class="btn" onclick="setSt('${seg}','ON_RGB',true)">RGB</button>`;
    if (has('hasHSV'))  btns += `<button class="btn" onclick="setSt('${seg}','ON_HSV',true)">HSV</button>`;
    if (has('hasFlow')) btns += `<button class="btn" onclick="setSt('${seg}','ON_FLOW',true)">Flow ✦</button>`;
    btns += `<button class="btn" onclick="setSt('${seg}','ON_NIGHT',true)">🌙 Ночь</button>`;
    btns += `<button class="btn btn-off" onclick="setSt('${seg}','OFF',true)">Выкл</button>`;

    // Слайдеры основного света
    let sliders = sliderHTML(seg, 'bright', 'Яркость', 1, 100, '');
    if (has('hasCT'))  sliders += sliderHTML(seg, 'ct', 'Темп-ра', 2700, 6500, 'K', 'ct-track');
    if (has('hasHSV')) {
        sliders += sliderHTML(seg, 'hue', 'Оттенок', 0, 359, '°', 'hue-track');
        sliders += sliderHTML(seg, 'sat', 'Насыщ.', 0, 100, '%');
    }

    // Блок фоновой подсветки
    let bgBlock = '';
    if (has('hasBG')) {
        let bgBtns = `<button class="btn btn-bg" onclick="setSt('${seg}','ON_BG',true)">BG вкл</button>` +
                     `<button class="btn btn-bg btn-off" onclick="setSt('${seg}','OFF_BG',true)">BG выкл</button>`;
        let bgSliders = sliderHTML(seg, 'bg_bright', 'BG ярк.', 1, 100, '', 'bg-track');
        if (has('hasBGCT')) bgSliders += sliderHTML(seg, 'bg_ct', 'BG темп.', 2700, 6500, 'K', 'ct-track bg-track');
        let bgColorRow = '';
        if (has('hasBGRGB')) {
            bgColorRow = `<div class="color-row">
                <span class="slider-label">BG цвет</span>
                <input type="color" id="clr-bg_rgb-${seg}" value="#ff8800"
                    onchange="setSt('${seg}','bg_rgb', parseInt(this.value.slice(1),16))">
                <span style="font-size:.7rem;color:var(--muted)" id="clrlbl-${seg}">—</span>
            </div>`;
        }
        bgBlock = `
            <div class="section-label">Фоновая подсветка</div>
            <div class="btn-group">${bgBtns}</div>
            ${bgSliders}${bgColorRow}`;
    }

    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = `
        <div class="card-header">
            <div>
                <div class="card-name">${title}</div>
                <div class="card-sub">${dev.model || '?'} · ${dev.ip}</div>
            </div>
            <div class="status-dot" id="dot-${seg}">offline</div>
        </div>
        <div class="lamp-visual">
            <div class="lamp-glow" id="glow-${seg}">${has('hasBG') ? `<div class="bg-ring" id="ring-${seg}"></div>` : ''}</div>
        </div>
        <div class="section-label">Основной свет</div>
        <div class="btn-group">${btns}</div>
        ${sliders}
        ${bgBlock}`;
    return { el, seg };
}

function sliderHTML(seg, key, label, min, max, sfx, rowClass) {
    const mid = Math.round((min + max) / 2);
    const sid = `sl-${key}-${seg}`;
    return `
    <div class="slider-row ${rowClass || ''}">
        <span class="slider-label">${label}</span>
        <input type="range" min="${min}" max="${max}" value="${mid}" id="${sid}"
            oninput="dragging.add('${sid}'); document.getElementById('sv-${key}-${seg}').textContent = this.value + '${sfx}'"
            onchange="dragging.delete('${sid}'); setSt('${seg}','${key}', +this.value)">
        <span class="slider-val" id="sv-${key}-${seg}">${mid}${sfx}</span>
    </div>`;
}

// ─── Применение состояния к карточке ────────────────────────────────────────
function applyState(id, state) {
    if (!id.startsWith(NS + '.')) return;
    const rest = id.slice(NS.length + 1);
    const dot = rest.indexOf('.');
    if (dot < 0) return;                       // info.connection и пр. — мимо
    const seg = rest.slice(0, dot);
    const key = rest.slice(dot + 1);
    if (!cards[seg] || key.includes('.')) return;   // flow.* и вложенные — мимо

    const val = state ? state.val : null;
    states[seg][key] = val;

    // Онлайн-точка
    if (key === '_connected') {
        const d = document.getElementById(`dot-${seg}`);
        if (d) { d.className = 'status-dot' + (isOn(val) ? ' on' : ''); d.textContent = isOn(val) ? 'online' : 'offline'; }
        cards[seg].classList.toggle('connected', isOn(val));
    }

    // Слайдеры (не трогаем, пока пользователь тащит)
    const sid = `sl-${key}-${seg}`;
    const sl = document.getElementById(sid);
    if (sl && val != null && !dragging.has(sid)) {
        sl.value = val;
        const sv = document.getElementById(`sv-${key}-${seg}`);
        if (sv) sv.textContent = val + (sl.closest('.ct-track') ? 'K' : (key === 'hue' ? '°' : (key === 'sat' ? '%' : '')));
    }

    // Пикер цвета BG
    if (key === 'bg_rgb' && typeof val === 'number') {
        const clr = document.getElementById(`clr-bg_rgb-${seg}`);
        const lbl = document.getElementById(`clrlbl-${seg}`);
        if (clr) clr.value = intToHex(val);
        if (lbl) lbl.textContent = intToHex(val);
    }

    updateGlow(seg);
}

/** Живое свечение: реальный цвет + яркость. Выключено — тёмный контур. */
function updateGlow(seg) {
    const st = states[seg];
    const glow = document.getElementById(`glow-${seg}`);
    if (!glow) return;

    const col = lampColor(st);
    const br = Math.max(0.15, (Number(st.bright) || 100) / 100);
    if (col) {
        glow.style.background = `radial-gradient(circle at 38% 35%, #fff8 0%, ${col} 55%, ${col} 100%)`;
        glow.style.borderColor = 'transparent';
        glow.style.boxShadow = `0 0 ${Math.round(40 * br)}px ${Math.round(14 * br)}px ${col}`;
    } else {
        glow.style.background = 'rgba(255,255,255,0.06)';
        glow.style.borderColor = 'rgba(255,255,255,0.1)';
        glow.style.boxShadow = 'none';
    }

    const ring = document.getElementById(`ring-${seg}`);
    if (ring) {
        const bc = bgColor(st);
        const bbr = Math.max(0.15, (Number(st.bg_bright) || 100) / 100);
        ring.style.borderColor = bc || 'rgba(255,255,255,0.06)';
        ring.style.boxShadow = bc ? `0 0 ${Math.round(24 * bbr)}px ${bc}` : 'none';
    }
}

// ─── Старт ───────────────────────────────────────────────────────────────────
function boot(native) {
    if (booted) return;
    booted = true;

    const devices = (native.devices || []).filter(d => d && d.ip && d.enabled !== false);
    const wrap = document.getElementById('devices');
    document.getElementById('empty').style.display = devices.length ? 'none' : '';
    if (!devices.length) document.getElementById('empty').textContent = 'Нет настроенных ламп — добавьте их в настройках адаптера.';

    devices.forEach(dev => {
        const { el, seg } = buildCard(dev);
        cards[seg] = el;
        states[seg] = {};
        devBySeg[seg] = dev;
        wrap.appendChild(el);
    });

    // Начальные состояния + живая подписка
    socket.emit('getStates', `${NS}.*`, (err, all) => {
        if (err) return console.error('[tab] getStates:', err);
        Object.entries(all || {}).forEach(([id, st]) => st && applyState(id, st));
    });
    socket.emit('subscribe', `${NS}.*`);
    socket.on('stateChange', (id, st) => applyState(id, st));
}

// Fallback: если adapter-settings не вызвал load() (поведение вкладок),
// стартуем сами — берём native из объекта инстанса.
setTimeout(() => {
    if (booted || typeof socket === 'undefined') return;
    socket.emit('getObject', `system.adapter.${NS}`, (err, obj) => {
        if (err || !obj) return console.error('[tab] getObject:', err);
        boot(obj.native || {});
    });
}, 800);
</script>
</body>
</html>
